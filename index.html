<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f2e">
<title>Para Brigeeth</title>
<style>
  :root{
    --night-top:#05071a;
    --night-mid:#0b0f2e;
    --night-bottom:#171033;
    --soil:#1d140f;
    --soil-light:#2e1d14;
    --tulip-red:#d62828;
    --tulip-red-dark:#9b1c1c;
    --iris-blue:#3a5edb;
    --iris-violet:#7b4fd1;
    --iris-white:#f5f3ff;
    --stem-green:#2f7a3d;
    --stem-green-dark:#1f5c2a;
    --flor-escala: 1.3;
    --flor-escala-pico: 1.4;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--night-bottom);
    font-family: 'Georgia', 'Times New Roman', serif;
    -webkit-text-size-adjust:100%;
  }

  .scene{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
    background: linear-gradient(to bottom,
      var(--night-top) 0%,
      var(--night-mid) 55%,
      var(--night-bottom) 78%
    );
    overflow:hidden;
  }

  /* ---------- ESTRELLAS ---------- */
  .stars{
    position:absolute;
    inset:0;
    width:100%;
    height:78%;
  }
  .star{
    position:absolute;
    background:#fff;
    opacity:0.6;
    clip-path: polygon(
      50% 0%, 61% 35%, 98% 35%, 68% 57%,
      79% 91%, 50% 70%, 21% 91%, 32% 57%,
      2% 35%, 39% 35%
    );
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%, 100%{ opacity:0.25; transform:scale(0.8);}
    50%{ opacity:1; transform:scale(1.15);}
  }

  .moon{
    position:absolute;
    top:8%;
    right:12%;
    width:70px;
    height:70px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #fffdf2, #f3ecc9 60%, #e9dfa6 100%);
    box-shadow: 0 0 40px 10px rgba(255,250,224,0.35);
    animation: glow 6s ease-in-out infinite;
  }
  @keyframes glow{
    0%,100%{ box-shadow:0 0 40px 10px rgba(255,250,224,0.35); }
    50%{ box-shadow:0 0 60px 18px rgba(255,250,224,0.55); }
  }

  /* ---------- TIERRA ---------- */
  .ground{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:22%;
    background: linear-gradient(to bottom, var(--soil-light), var(--soil));
    border-top: 3px solid #3a2a1e;
  }
  .ground::before{
    content:"";
    position:absolute;
    top:-3px;
    left:0;
    width:100%;
    height:6px;
    background: repeating-linear-gradient(90deg,
      rgba(60,110,40,0.6) 0px, rgba(60,110,40,0.6) 6px,
      transparent 6px, transparent 14px);
    opacity:0.5;
  }

  /* ---------- TEXTO ---------- */
  .titulo{
    position:absolute;
    top:6%;
    left:50%;
    transform: translateX(-50%);
    text-align:center;
    color:#f6f1e3;
    letter-spacing:2px;
    font-size: clamp(22px, 4vw, 38px);
    text-shadow: 0 0 12px rgba(255,255,255,0.45), 0 0 30px rgba(150,170,255,0.25);
    opacity:0;
    animation: apareceTitulo 2.5s ease-out forwards;
    animation-delay: 0.5s;
    z-index:5;
  }
  .titulo span{
    display:block;
    font-size: 0.45em;
    letter-spacing:6px;
    text-transform:uppercase;
    color:#cfd6ff;
    opacity:0.85;
    margin-bottom:4px;
  }
  @keyframes apareceTitulo{
    0%{ opacity:0; transform:translate(-50%, -15px); }
    100%{ opacity:1; transform:translate(-50%, 0); }
  }

  /* ---------- CONTENEDORES DE FLORES ---------- */
  .jardin{
    position:absolute;
    bottom:18%;
    left:0;
    width:100%;
    height:62%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap: clamp(20px, 8vw, 90px);
    z-index:2;
  }

  .planta{
    position:relative;
    width: clamp(130px, 34vw, 220px);
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
  }

  /* ---------- TALLO ---------- */
  .tallo{
    position:absolute;
    bottom:0;
    left:50%;
    width:10px;
    height:0%;
    background: linear-gradient(to top, var(--stem-green-dark), var(--stem-green));
    border-radius:6px;
    transform: translateX(-50%);
    transform-origin:bottom center;
    animation: crecerTallo 3s ease-out forwards;
    box-shadow: inset -2px 0 3px rgba(0,0,0,0.25);
  }
  @keyframes crecerTallo{
    0%{ height:0%; }
    100%{ height:62%; }
  }

  .hoja{
    position:absolute;
    width:46px;
    height:20px;
    background: linear-gradient(120deg, var(--stem-green), var(--stem-green-dark));
    border-radius: 0 50% 50% 50%;
    opacity:0;
    animation: apareceHoja 1.2s ease-out forwards;
  }
  @keyframes apareceHoja{
    0%{ opacity:0; transform: scale(0) rotate(var(--rot)); }
    100%{ opacity:1; transform: scale(1) rotate(var(--rot)); }
  }

  .hoja-izq{
    left:calc(50% - 44px);
    bottom:26%;
    --rot:-15deg;
    transform-origin: right center;
    animation-delay:1.6s;
  }
  .hoja-der{
    left:calc(50% + 2px);
    bottom:34%;
    --rot:15deg;
    transform-origin: left center;
    border-radius:50% 0 50% 50%;
    animation-delay:1.9s;
  }

  /* ---------- FLOR: contenedor que sube con el tallo ---------- */
  .flor{
    position:absolute;
    bottom:60%;
    left:50%;
    transform: translate(-50%, 0) scale(0);
    transform-origin:center bottom;
    opacity:0;
    animation: brotarFlor 1.6s cubic-bezier(.34,1.56,.64,1) forwards;
    animation-delay:2.6s;
    z-index:3;
  }
  @keyframes brotarFlor{
    0%{ opacity:0; transform:translate(-50%,20px) scale(0.1) rotate(-8deg); }
    60%{ opacity:1; transform:translate(-50%,-4px) scale(var(--flor-escala-pico, 1.08)) rotate(3deg); }
    100%{ opacity:1; transform:translate(-50%,0) scale(var(--flor-escala, 1)) rotate(0deg); }
  }

  .flor-balanceo{
    animation: balanceo 4.5s ease-in-out infinite;
    animation-delay:4.2s;
  }
  @keyframes balanceo{
    0%,100%{ transform: rotate(-2.5deg); }
    50%{ transform: rotate(2.5deg); }
  }

  /* ================= TULIPAN ================= */
  .tulipan{
    position:relative;
    width:110px;
    height:130px;
  }
  .tulipan .petalo{
    position:absolute;
    bottom:0;
    width:46px;
    height:100px;
    background: linear-gradient(to top, var(--tulip-red-dark), var(--tulip-red) 60%, #f06a6a 100%);
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
    box-shadow: inset 0 -10px 14px rgba(0,0,0,0.25);
  }
  .tulipan .petalo.centro{
    left:50%;
    transform: translateX(-50%);
    height:108px;
    z-index:3;
  }
  .tulipan .petalo.izq{
    left:18px;
    transform: rotate(-18deg);
    z-index:2;
  }
  .tulipan .petalo.der{
    right:18px;
    transform: rotate(18deg);
    z-index:2;
  }
  .tulipan .petalo.izq-ext{
    left:2px;
    transform: rotate(-32deg);
    z-index:1;
    opacity:0.95;
  }
  .tulipan .petalo.der-ext{
    right:2px;
    transform: rotate(32deg);
    z-index:1;
    opacity:0.95;
  }
  .tulipan .brillo{
    position:absolute;
    top:14px;
    left:50%;
    transform: translateX(-50%);
    width:14px;
    height:50px;
    background: linear-gradient(to top, rgba(255,255,255,0), rgba(255,255,255,0.5));
    border-radius:50%;
    z-index:4;
  }

  /* ================= LIRIO (azul/violeta/blanco) ================= */
  .lirio{
    position:relative;
    width:150px;
    height:140px;
  }
  .lirio .petalo{
    position:absolute;
    bottom:6px;
    left:50%;
    width:36px;
    height:88px;
    background: linear-gradient(to top,
      var(--iris-blue) 0%,
      var(--iris-violet) 55%,
      var(--iris-white) 100%);
    border-radius: 50% 50% 10% 10% / 65% 65% 15% 15%;
    transform-origin: bottom center;
    box-shadow: inset 0 -8px 10px rgba(20,10,60,0.35);
  }
  .lirio .petalo::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:10px;
    width:3px;
    height:55%;
    background: rgba(255,255,255,0.55);
    transform: translateX(-50%);
    border-radius:2px;
  }
  .lirio .petalo.p1{ transform: translateX(-50%) rotate(0deg)   translateY(-18px); z-index:4; }
  .lirio .petalo.p2{ transform: translateX(-50%) rotate(72deg)  translateY(-18px); z-index:3; }
  .lirio .petalo.p3{ transform: translateX(-50%) rotate(144deg) translateY(-18px); z-index:3; }
  .lirio .petalo.p4{ transform: translateX(-50%) rotate(216deg) translateY(-18px); z-index:3; }
  .lirio .petalo.p5{ transform: translateX(-50%) rotate(288deg) translateY(-18px); z-index:3; }

  .lirio .centro-flor{
    position:absolute;
    bottom:42px;
    left:50%;
    transform: translateX(-50%);
    width:20px;
    height:20px;
    background: radial-gradient(circle, #fff6d6, var(--iris-white) 70%);
    border-radius:50%;
    z-index:5;
    box-shadow: 0 0 10px rgba(255,255,255,0.7);
  }
  .lirio .estambre{
    position:absolute;
    bottom:50px;
    left:50%;
    width:3px;
    height:16px;
    background:#e9c75d;
    border-radius:2px;
    transform-origin:bottom center;
    z-index:6;
  }
  .lirio .estambre::after{
    content:"";
    position:absolute;
    top:-3px;
    left:-2px;
    width:7px;
    height:7px;
    background:#caa53a;
    border-radius:50%;
  }

  /* ---------- dedicatoria final ---------- */
  .dedicatoria{
    position:absolute;
    bottom:3%;
    left:50%;
    transform: translateX(-50%);
    color:#fff8e7;
    font-style:italic;
    font-size: clamp(16px, 2.6vw, 22px);
    text-shadow: 0 0 10px rgba(255,220,150,0.5);
    opacity:0;
    animation: apareceTitulo 2s ease-out forwards;
    animation-delay:5.4s;
    z-index:5;
  }

  /* particulas flotantes suaves */
  .particula{
    position:absolute;
    bottom:18%;
    width:4px;
    height:4px;
    background: rgba(255,255,255,0.6);
    border-radius:50%;
    opacity:0;
    animation: flotar 8s linear infinite;
  }
  @keyframes flotar{
    0%{ opacity:0; transform: translateY(0) translateX(0); }
    10%{ opacity:0.7; }
    90%{ opacity:0.4; }
    100%{ opacity:0; transform: translateY(-60vh) translateX(20px); }
  }

  /* ---------- RESPONSIVE: TELEFONOS ---------- */
  @media (max-width: 600px){
    :root{
      --flor-escala: 1.05;
      --flor-escala-pico: 1.15;
    }
    .titulo{
      top:5%;
      font-size: clamp(18px, 6vw, 26px);
      padding: 0 10px;
      max-width: 92%;
    }
    .titulo span{
      font-size:0.4em;
      letter-spacing:3px;
    }
    .dedicatoria{
      font-size: clamp(15px, 5vw, 19px);
      bottom:4%;
    }
    .moon{
      width:46px;
      height:46px;
      top:6%;
      right:8%;
    }
    .jardin{
      gap: clamp(8px, 3vw, 24px);
      bottom:16%;
    }
    .hoja{
      width:32px;
      height:14px;
    }
    .hoja-izq{ left:calc(50% - 30px); }
    .hoja-der{ left:calc(50% + 2px); }
  }

  @media (max-width: 380px){
    :root{
      --flor-escala: 0.85;
      --flor-escala-pico: 0.92;
    }
    .titulo{ font-size: clamp(16px, 6vw, 22px); }
    .dedicatoria{ font-size: clamp(13px, 4.5vw, 17px); }
  }

  /* Pantallas bajas/anchas (telefono horizontal) */
  @media (max-height: 480px){
    .titulo{ top:3%; font-size: clamp(14px, 4vw, 20px); }
    .titulo span{ margin-bottom:2px; }
    .dedicatoria{ bottom:2%; font-size: clamp(12px, 3vw, 16px); }
    .moon{ width:36px; height:36px; }
    .jardin{ bottom:14%; height:66%; }
  }

  @media (prefers-reduced-motion: reduce){
    .star, .moon, .titulo, .dedicatoria, .particula{
      animation-duration:0.01ms !important;
      animation-delay:0s !important;
    }
    .tallo{ height:62% !important; animation:none !important; }
    .hoja{ opacity:1 !important; animation:none !important; }
    .flor{
      opacity:1 !important;
      animation:none !important;
      transform: translate(-50%,0) scale(var(--flor-escala, 1)) !important;
    }
    .flor-balanceo{ animation:none !important; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <div class="titulo"><span>con cari&ntilde;o</span>Un jard&iacute;n para ti</div>

  <div class="ground"></div>

  <div class="jardin">

    <!-- TULIPAN ROJO -->
    <div class="planta">
      <div class="tallo">
        <div class="hoja hoja-izq"></div>
        <div class="hoja hoja-der"></div>
      </div>
      <div class="flor">
        <div class="flor-balanceo">
          <div class="tulipan">
            <div class="petalo izq-ext"></div>
            <div class="petalo der-ext"></div>
            <div class="petalo izq"></div>
            <div class="petalo der"></div>
            <div class="petalo centro"></div>
            <div class="brillo"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- LIRIO AZUL / VIOLETA / BLANCO -->
    <div class="planta">
      <div class="tallo">
        <div class="hoja hoja-izq"></div>
        <div class="hoja hoja-der"></div>
      </div>
      <div class="flor">
        <div class="flor-balanceo">
          <div class="lirio">
            <div class="petalo p1"></div>
            <div class="petalo p2"></div>
            <div class="petalo p3"></div>
            <div class="petalo p4"></div>
            <div class="petalo p5"></div>
            <div class="estambre" style="transform:translateX(-50%) rotate(10deg);"></div>
            <div class="estambre" style="transform:translateX(-50%) rotate(-25deg);"></div>
            <div class="estambre" style="transform:translateX(-50%) rotate(40deg);"></div>
            <div class="centro-flor"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="dedicatoria">para Brigeeth</div>

  <div id="particulas"></div>
</div>

<script>
  // Generar estrellas aleatorias
  const starsContainer = document.getElementById('stars');
  const esMovil = window.innerWidth < 600;
  const totalStars = esMovil ? 60 : 90;
  const tamMin = esMovil ? 3.5 : 5;
  const tamVar = esMovil ? 3 : 5;
  for(let i=0; i<totalStars; i++){
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random()*tamVar + tamMin;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.top = (Math.random()*92) + '%';
    star.style.left = (Math.random()*100) + '%';
    star.style.animationDelay = (Math.random()*3) + 's';
    star.style.animationDuration = (2 + Math.random()*3) + 's';
    starsContainer.appendChild(star);
  }

  // Particulas flotantes (polen / luz)
  const particulasContainer = document.getElementById('particulas');
  const totalParticulas = 18;
  for(let i=0; i<totalParticulas; i++){
    const p = document.createElement('div');
    p.className = 'particula';
    p.style.left = (Math.random()*100) + '%';
    p.style.animationDelay = (Math.random()*8) + 's';
    p.style.animationDuration = (6 + Math.random()*6) + 's';
    particulasContainer.appendChild(p);
  }
</script>

</body>
</html>
